{% extends "base.html" %}
{% block title %}Error {{ code }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6 text-center py-5">
    <div class="error-code text-primary fw-bold mb-3">{{ code }}</div>
    <h4 class="fw-semibold mb-2">{{ message }}</h4>
    <p class="text-muted mb-4">
      Algo salió mal, pero no te preocupes — la app sigue funcionando.
    </p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">
      <i class="bi bi-house me-1"></i>Volver al inicio
    </a>
  </div>
</div>
{% endblock %}
